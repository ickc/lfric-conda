# Build every recipe on every target platform.
#
# Structure: one reusable workflow (build-pkg.yml) builds a single recipe across
# the whole platform matrix; this file calls it once per package and wires the
# build-dependency DAG with `needs:`. The result is a per-(package x platform)
# grid of status checks that fail and re-run independently -- so iterating on,
# say, xios on osx-arm64 does not rebuild the packages that already pass.
#
# Platforms: linux-64, linux-aarch64 (primary -- Isambard 3 is Cray EX / Grace),
# and osx-64 + osx-arm64 (developer tier -- see docs/platform-coverage.md).
# Windows is deliberately out of scope (no conda-forge mpich; the underlying HPC
# codes have no Windows build) -- also documented there.
name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel superseded PR runs. On main every commit's packages matter.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Passed through to the reusable workflow; `gh run download` needs actions:read
# to restore dependency artifacts within the same run.
permissions:
  contents: read
  actions: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          shellcheck --version
          # Recipe build/test scripts, the LFRic-source patches and the Stage-2
          # example scripts are all shipped and executed too, so lint them
          # alongside scripts/ rather than only checking the drivers.
          scripts_to_check=(
            scripts/*.sh
            recipes/*/build.sh recipes/*/*test*.sh
            patches/*.sh
            examples/*/*.sh
            examples/science-suites/site/*.sh
            examples/science-suites/site/bin/launch-exe
          )
          bash -n "${scripts_to_check[@]}"
          shellcheck "${scripts_to_check[@]}"

      - name: cylc lint the science suites
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: cylc
          create-args: cylc-flow cylc-rose metomi-rose
          condarc: |
            channels:
              - conda-forge
      - name: cylc validate
        shell: bash -el {0}
        run: |
          set -euo pipefail
          # Cheap structural check of the ported suites: every flow.cylc must parse
          # and validate with the template variables run-suite.sh injects. The
          # end-to-end run happens in the stage2 jobs; this catches a broken suite
          # in seconds instead of an hour in.
          for suite in examples/science-suites/u-*; do
            echo "::group::cylc validate $suite"
            # `./` prefix is required: cylc 8.6 treats a bare relative path as a
            # workflow ID (looked up under ~/cylc-run) rather than a source dir.
            cylc validate "./$suite" \
              -S "REPO_ROOT='$PWD'" \
              -S "LFRIC_CONDA_ENV='$CONDA_PREFIX'" \
              -S "ACTIVATE_ENV='$PWD/examples/science-suites/site/activate-env.sh'" \
              -S "CYLC_PLATFORM='localhost'" \
              -S "CORES_PER_NODE=4"
            echo "::endgroup::"
          done

  # --- roots (no dependency on another package in our channel) ---------------
  rose-picker:
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: rose-picker

  blitzpp:
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: blitzpp

  yaxt:
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: yaxt

  shumlib:
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: shumlib

  gftl:
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: gftl

  # --- dependents (build against our own channel) ---------------------------
  # `if: !cancelled()` so that a dependency failing on ONE platform does not skip
  # the whole dependent job -- only the matching platform cell fails (when it
  # cannot restore that platform's dependency artifact).
  xios:
    needs: [blitzpp]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: xios
      deps: blitzpp

  gftl-shared:
    needs: [gftl]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: gftl-shared
      deps: gftl

  fargparse:
    needs: [gftl, gftl-shared]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: fargparse
      deps: gftl gftl-shared

  pfunit:
    needs: [gftl, gftl-shared, fargparse]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/build-pkg.yml
    with:
      package: pfunit
      deps: gftl gftl-shared fargparse

  # --- Stage 2: use the environment ----------------------------------------
  # Everything above builds the ENVIRONMENT. These two jobs are the point of it:
  # they assemble envs/lfric-env.yaml from the artifacts above plus conda-forge,
  # and then do real LFRic work with it -- compile the science target, and run a
  # real Rose/Cylc science suite end to end (extract -> build -> mesh -> run).
  # They are what makes "the conda environment is a drop-in for the Spack one" a
  # tested claim rather than an assertion. See .github/workflows/stage2.yml.
  #
  # They depend on every package the environment resolves from our channel, so
  # they run only once the whole Stage-1 grid is green for their platform.
  stage2-compile:
    needs: [rose-picker, blitzpp, yaxt, xios, shumlib, gftl, gftl-shared, fargparse, pfunit]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/stage2.yml
    with:
      example: minimal-compile

  stage2-suite:
    needs: [rose-picker, blitzpp, yaxt, xios, shumlib, gftl, gftl-shared, fargparse, pfunit]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/stage2.yml
    with:
      example: science-suite
