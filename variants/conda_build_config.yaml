# Variant configuration for local and CI builds.
#
# conda-forge supplies these globally to its feedstocks. Building standalone we
# have to state them ourselves. Keeping them HERE rather than inlining values in
# the recipes means each recipe stays byte-identical to what gets submitted
# upstream -- the recipe never has to be rewritten to migrate.

# --- C standard library (backs the recipes' `stdlib('c')`) ------------------
# The sysroot sets the OLDEST glibc a built binary will run against, so lower is
# more portable. 2.17 is conda-forge's historical baseline but is too old HERE:
# conda-forge's own libfabric (pulled in by mpich) references getrandom@GLIBC_2.25,
# so linking anything against MPI under a 2.17 sysroot fails with
#   libfabric.so.1: undefined reference to `getrandom@GLIBC_2.25'
# 2.28 is the lowest that satisfies it. Isambard 3 runs glibc 2.38, so this is
# comfortably below the deployment target.
c_stdlib:
  - sysroot
c_stdlib_version:
  - "2.28"

# --- Compiler ---------------------------------------------------------------
# Pinned to 14.3 to match BOTH the Spack environment's gcc@14.3.0 and the
# compiler conda-forge currently builds its aarch64 Fortran stack with
# (netcdf-fortran run-requires libgfortran5 >=14.3.0). Fortran .mod files are
# only readable by the compiler generation that wrote them, so this pin is load
# bearing -- see docs/proposal.md.
c_compiler_version:
  - "14"
cxx_compiler_version:
  - "14"
fortran_compiler_version:
  - "14"

# --- MPI --------------------------------------------------------------------
# MVP-1 targets mpich only, matching envs/lfric-env-mvp1.yaml. Adding openmpi
# here produces the second variant set for the MPI-dependent packages (yaxt,
# xios); conda-forge would additionally build a `nompi` variant where meaningful.
mpi:
  - mpich
