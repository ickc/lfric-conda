# Variant configuration for local and CI builds -- the COMMON (all-platform) keys.
#
# conda-forge supplies these globally to its feedstocks. Building standalone we
# have to state them ourselves. Keeping them here (not inlined in recipes) means
# each recipe stays byte-identical to what gets submitted upstream.
#
# Platform-specific pins (C/C++ compiler generation, the C standard library) do
# NOT live here: they differ between linux (GNU gcc + glibc sysroot) and macOS
# (clang + macOS deployment target). rattler-build does NOT honour conda-build
# "# [osx]" selectors inside a variant file, but it DOES merge multiple
# --variant-config files, so those pins live in per-OS overlays that
# scripts/common.sh selects by `uname` and passes on top of this base:
#   variants/linux.yaml    variants/osx.yaml
# See docs/platform-coverage.md for the full rationale.

# --- MPI --------------------------------------------------------------------
# MVP targets mpich only, matching envs/lfric-env-mvp*.yaml. Adding openmpi here
# would produce the second variant set for the MPI-dependent packages (yaxt,
# xios, pfunit). mpich exists on linux-64/aarch64 and osx-64/arm64 -- but NOT on
# Windows (only msmpi, a different API), which is one reason Windows is out of
# scope (docs/platform-coverage.md).
mpi:
  - mpich

# --- Fortran compiler generation (common to linux AND osx) ------------------
# gfortran is the Fortran compiler on BOTH platforms -- there is no production
# clang-Fortran in conda-forge -- and conda-forge pins fortran_compiler_version
# to 14 on both linux and osx. So this is genuinely platform-independent and
# lives in the base.
#
# It is load bearing: Fortran .mod files are only readable by the compiler
# generation that wrote them, so this must match the gfortran conda-forge built
# its netcdf-fortran / hdf5 / (and our xios / yaxt / shumlib consumers) with. On
# osx conda-forge's Fortran stack is gfortran 14 too, so the same pin is correct
# there -- see docs/proposal.md and docs/platform-coverage.md.
fortran_compiler_version:
  - "14"
