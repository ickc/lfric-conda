# u-dr932 -- GungHo Shallow/Deep Hot Jupiter Temperature Forcing.
#
# Ported to the conda Stage-1 environment (this repo) from the same suite in
# ickc/lfric-env-isambard. The SCIENCE is unchanged -- same case setup, timestep,
# levels and mesh family. What changed:
#   - the site/batch template variables (EX_HOST, ISAMBARD3_*) are gone: the conda
#     environment is self-contained, so flow.cylc has one platform family and
#     defaults to cylc's `localhost` (job runner = background).
#   - ACTIVATE_ENV / LFRIC_CONDA_ENV / REPO_ROOT / CYLC_PLATFORM / CORES_PER_NODE
#     are injected by run-suite.sh via `cylc vip -S`, so this file stays
#     path-independent.
#   - the LFRic source refs come from dependencies.yaml, materialised OFFLINE from
#     this repo's staged vendor/ mirrors by site/extract-sources.sh (no clone).
#
# Scale: the defaults below are the smallest configuration of this suite that is
# still the same science -- C24 mesh, 6 ranks (one per cubed-sphere panel), a
# 2-hour forecast (6 steps at dt=1200s). That is what makes it runnable on a
# 4-core CI runner. For a full-size run use C48_MG, TOTAL_RANKS_REQ=24 and
# EXPT_RUNLEN/EXPT_RESUB of P1D, as validated on Isambard 3.
[template variables]
BUILD_LFRIC=true
CASE_SETUP='shallow-hot-jupiter'
COMPILER='gnu'
EXPT_DT=1200.0
EXPT_RESUB='PT2H'
EXPT_RUNLEN='PT2H'
EXPT_START='20000101T0000Z'
LFRIC_CPU='PT1H'
LFRIC_LEVS=''
LFRIC_RES='C24_MG'
PHYSICS_CONF=''
# 6 = the 6 cubed-sphere panels, 1x1 each -- the smallest valid decomposition of a
# cubed-sphere mesh above a single rank. On Isambard 3 this suite runs at 24
# (6 panels x 2x2) on one node.
TOTAL_RANKS_REQ=6
VN='3.0'
